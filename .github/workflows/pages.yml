# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll site tnt to Pages

on: # 只有 master / docs 下的变化才触发
  push:
    branches: 
      - "master"
    paths:
      - "docs/**"
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build: # Build job
    runs-on: ubuntu-latest
    
    defaults: # 设置工作目录为 /docs
      run:
        working-directory: docs
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 确保 CNAME 文件被检出
      
      - name: Setup Ruby and install gems
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3' # Not needed with a .ruby-version file
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          cache-version: 0 # Increment this number if you need to re-download cached gems
          # working-directory: '${{ github.workspace }}/docs' # 增加工作目录参数
      
      # 添加验证步骤，检查是否正确安装了 gems
      - name: Verify bundle installation
        run: |
          bundle check || bundle install
          bundle exec jekyll --version
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        # run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        # 构建时使用自定义域名配置
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production
          # JEKYLL_ENV_PRODUCTION: true   # 确保使用正确的 URL
      
      - name: Verify _site contents
        run: |
          ls -la _site/
          # 检查 CNAME 文件是否在构建输出中
          if [ -f _site/CNAME ]; then
            echo "CNAME file found in build output"
            cat _site/CNAME
          else
            echo "CNAME file NOT found in build output"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/_site/
  
        # 在 build 步骤后添加
      - name: Debug info
        run: |
          echo "Base path: ${{ steps.pages.outputs.base_path }}"
          echo "Current directory: $(pwd)"
          echo "Files in docs directory:"
          ls -la
          echo "Files in _site directory:"
          ls -la _site/

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4